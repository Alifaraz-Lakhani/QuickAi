global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: quickai-local
    environment: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: quickai-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - server:3000

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml
