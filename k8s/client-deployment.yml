apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickai-client
  namespace: quickai
  labels:
    app: quickai-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quickai-client
  template:
    metadata:
      labels:
        app: quickai-client
    spec:
      containers:
      - name: client
        image: quickai-client:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        
        # Resource limits
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: quickai-client
  namespace: quickai
  labels:
    app: quickai-client
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: quickai-client
