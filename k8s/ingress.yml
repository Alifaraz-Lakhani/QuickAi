apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quickai-ingress
  namespace: quickai
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - quickai.example.com
    - api.quickai.example.com
    secretName: quickai-tls
  rules:
  - host: quickai.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: quickai-client
            port:
              number: 80
  - host: api.quickai.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: quickai-server
            port:
              number: 3000
