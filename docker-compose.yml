services:
  client:
    build:
      context: ./client
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    env_file:
      - .env
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - quickai-network
# ... (keep server and networks as they were)
  server:
    build: ./server
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    networks:
      - quickai-network

networks:
  quickai-network:
    driver: bridge